name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'اسم التطبيق'
        required: true
        type: string
      packageId:
        description: 'معرف الحزمة (مثل com.example.app)'
        required: true
        type: string
      webUrl:
        description: 'رابط الموقع'
        required: true
        type: string
      appIcon:
        description: 'رابط أيقونة التطبيق (اختياري)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 📦 Create project directory
        run: |
          mkdir -p app-builder
          cd app-builder
          npm init -y
          
      - name: ⚙️ Generate Capacitor Config
        run: |
          cd app-builder
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.packageId }}",
            "appName": "${{ github.event.inputs.appName }}",
            "webDir": "www",
            "server": {
              "url": "${{ github.event.inputs.webUrl }}",
              "cleartext": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 3000,
                "backgroundColor": "#f59e0b"
              }
            }
          }
          EOF
          
          cat capacitor.config.json
      
      - name: 🌐 Create web files
        run: |
          cd app-builder
          mkdir -p www
          cat > www/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
              <title>${{ github.event.inputs.appName }}</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                  }
                  .loading-screen {
                      position: fixed;
                      top: 0;
                      left: 0;
                      right: 0;
                      bottom: 0;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      justify-content: center;
                      z-index: 1000;
                      transition: opacity 0.5s;
                  }
                  .spinner {
                      width: 50px;
                      height: 50px;
                      border: 4px solid rgba(255,255,255,0.3);
                      border-top-color: white;
                      border-radius: 50%;
                      animation: spin 1s linear infinite;
                  }
                  @keyframes spin {
                      to { transform: rotate(360deg); }
                  }
                  .loading-text {
                      color: white;
                      margin-top: 20px;
                      font-size: 16px;
                  }
                  iframe {
                      width: 100%;
                      height: 100%;
                      border: none;
                      display: none;
                  }
              </style>
          </head>
          <body>
              <div class="loading-screen" id="loading">
                  <div class="spinner"></div>
                  <div class="loading-text">جاري تحميل ${{ github.event.inputs.appName }}...</div>
              </div>
              <iframe id="appFrame" src="${{ github.event.inputs.webUrl }}" allow="geolocation; microphone; camera"></iframe>
              <script>
                  const iframe = document.getElementById('appFrame');
                  const loading = document.getElementById('loading');
                  iframe.onload = () => {
                      loading.style.opacity = '0';
                      setTimeout(() => loading.style.display = 'none', 500);
                      iframe.style.display = 'block';
                  };
              </script>
          </body>
          </html>
          EOF
      
      - name: 📱 Install Capacitor
        run: |
          cd app-builder
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "${{ github.event.inputs.appName }}" "${{ github.event.inputs.packageId }}" --web-dir=www
      
      - name: 🤖 Add Android platform
        run: |
          cd app-builder
          npx cap add android
          npx cap copy
      
      - name: 🔨 Build APK
        run: |
          cd app-builder/android
          chmod +x gradlew
          ./gradlew assembleRelease || ./gradlew assembleDebug
      
      - name: 📦 Find and rename APK
        run: |
          cd app-builder/android/app/build/outputs/apk
          
          # البحث عن ملف APK
          if [ -f "release/app-release.apk" ]; then
            cp release/app-release.apk release/${{ github.event.inputs.appName }}.apk
            echo "APK_PATH=app-builder/android/app/build/outputs/apk/release/${{ github.event.inputs.appName }}.apk" >> $GITHUB_ENV
          elif [ -f "debug/app-debug.apk" ]; then
            cp debug/app-debug.apk debug/${{ github.event.inputs.appName }}.apk
            echo "APK_PATH=app-builder/android/app/build/outputs/apk/debug/${{ github.event.inputs.appName }}.apk" >> $GITHUB_ENV
          fi
      
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-app
          path: ${{ env.APK_PATH }}
          retention-days: 7
      
      - name: 📤 Upload source code (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-source
          path: app-builder/
          retention-days: 3

      - name: ✅ Complete
        run: |
          echo "✅ Build completed successfully!"
          echo "📱 APK is ready for download"
